<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIVERSUS — Criar Conta</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 60px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
            overflow: hidden;
        }

        .stars-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .nebula {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            pointer-events: none;
        }

        .nebula-1 {
            top: -200px;
            left: -100px;
            background: #6a0dad;
        }

        .nebula-2 {
            bottom: -200px;
            right: -100px;
            background: #1e90ff;
        }

        .nebula-3 {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #ff1493;
            opacity: 0.07;
        }

        .title {
            position: relative;
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: 0.8rem;
            background: linear-gradient(135deg, #a78bfa, #60a5fa, #f472b6, #a78bfa);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 6s ease infinite;
            user-select: none;
        }

        @keyframes gradientShift {

            0%,
            100% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }
        }

        .card {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 25px 28px 20px;
            width: 370px;
            max-width: 92vw;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .card .icon {
            width: 44px;
            height: 44px;
            margin: 0 auto 10px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7c3aed, #3b82f6);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3);
        }

        .card .icon svg {
            width: 22px;
            height: 22px;
            fill: white;
        }

        .card h2 {
            color: #e2e8f0;
            text-align: center;
            margin-bottom: 2px;
            font-size: 1.2rem;
            letter-spacing: 0.05em;
        }

        .card .subtitle {
            color: rgba(255, 255, 255, 0.35);
            text-align: center;
            font-size: 0.85rem;
            margin-bottom: 12px;
        }

        .form-group {
            margin-bottom: 10px;
        }

        .form-group label {
            display: block;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.82rem;
            margin-bottom: 6px;
            letter-spacing: 0.03em;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper svg {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            fill: rgba(255, 255, 255, 0.25);
            pointer-events: none;
            transition: fill 0.3s;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 9px 14px 9px 38px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: #e2e8f0;
            font-size: 0.85rem;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
            font-family: inherit;
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.18);
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: #a78bfa;
            box-shadow: 0 0 15px rgba(167, 139, 250, 0.15);
        }

        .form-group input:focus+svg,
        .input-wrapper:focus-within svg {
            fill: #a78bfa;
        }

        .form-group select option {
            background: #1a1a2e;
            color: #e2e8f0;
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
        }

        .toggle-password svg {
            position: static;
            transform: none;
            width: 18px;
            height: 18px;
            fill: rgba(255, 255, 255, 0.25);
            transition: fill 0.3s;
        }

        .toggle-password:hover svg {
            fill: rgba(255, 255, 255, 0.6);
        }

        .strength-bar {
            display: flex;
            gap: 4px;
            margin-top: 5px;
        }

        .strength-bar .bar {
            flex: 1;
            height: 3px;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.1);
            transition: background 0.3s;
        }

        .strength-text {
            font-size: 0.72rem;
            margin-top: 4px;
            color: rgba(255, 255, 255, 0.3);
            transition: color 0.3s;
        }

        /* Role selector */
        .role-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
        }

        .role-option {
            flex: 1;
            padding: 12px 8px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.04);
            border: 2px solid rgba(255, 255, 255, 0.08);
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            user-select: none;
        }

        .role-option:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .role-option.active {
            border-color: #7c3aed;
            background: rgba(124, 58, 237, 0.15);
        }

        .role-option .role-icon {
            font-size: 1.3rem;
            margin-bottom: 4px;
        }

        .role-option .role-label {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 600;
        }

        .role-option.active .role-label {
            color: #c4b5fd;
        }

        .terms {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin: 22px 0;
        }

        .terms input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            min-width: 18px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.05);
            cursor: pointer;
            margin-top: 2px;
            position: relative;
        }

        .terms input[type="checkbox"]:checked {
            background: linear-gradient(135deg, #7c3aed, #3b82f6);
            border-color: transparent;
        }

        .terms input[type="checkbox"]:checked::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 5px;
            width: 5px;
            height: 9px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        .terms label {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.8rem;
            line-height: 1.4;
            cursor: pointer;
        }

        .terms a {
            color: #a78bfa;
            text-decoration: none;
        }

        .terms a:hover {
            text-decoration: underline;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.05em;
            transition: transform 0.2s, box-shadow 0.3s, opacity 0.3s;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: linear-gradient(135deg, #7c3aed, #3b82f6);
            color: white;
            box-shadow: 0 4px 20px rgba(124, 58, 237, 0.3);
        }

        .btn-primary:hover:not(:disabled) {
            box-shadow: 0 4px 30px rgba(124, 58, 237, 0.5);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            color: #e2e8f0;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }

        .btn-secondary:hover:not(:disabled) {
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.2);
        }

        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 20;
            padding: 18px;
        }

        .modal-backdrop.active {
            display: flex;
        }

        .modal-card {
            width: min(420px, 100%);
            background: rgba(15, 23, 42, 0.96);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 18px;
            box-shadow: 0 18px 60px rgba(0, 0, 0, 0.35);
            padding: 24px;
            text-align: center;
            color: #e2e8f0;
        }

        .modal-card h3 {
            margin-bottom: 10px;
            font-size: 1.2rem;
        }

        .modal-card p {
            margin-bottom: 18px;
            color: rgba(226, 232, 240, 0.75);
            line-height: 1.6;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .modal-card .btn {
            width: auto;
            padding: 12px 18px;
            min-width: 120px;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 22px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.08);
        }

        .divider span {
            color: rgba(255, 255, 255, 0.25);
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .message {
            text-align: center;
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 0.83rem;
            display: none;
        }

        .message.success {
            display: block;
            background: rgba(34, 197, 94, 0.12);
            border: 1px solid rgba(34, 197, 94, 0.25);
            color: #86efac;
        }

        .message.error {
            display: block;
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.25);
            color: #fca5a5;
        }

        .footer-link {
            text-align: center;
            margin-top: 24px;
            color: rgba(255, 255, 255, 0.35);
            font-size: 0.85rem;
        }

        .footer-link a {
            color: #a78bfa;
            text-decoration: none;
            font-weight: 600;
        }

        .footer-link a:hover {
            text-decoration: underline;
        }

        .btn .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .btn-google {
            background: rgba(255, 255, 255, 0.07);
            color: #e2e8f0;
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background 0.3s, border-color 0.3s;
        }

        .btn-google:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(167, 139, 250, 0.4);
        }
    </style>
</head>

<body>

    <canvas class="stars-layer" id="stars1"></canvas>
    <canvas class="stars-layer" id="stars2"></canvas>
    <canvas class="stars-layer" id="stars3"></canvas>

    <div class="nebula nebula-1"></div>
    <div class="nebula nebula-2"></div>
    <div class="nebula nebula-3"></div>

    <h1 class="title">UNIVERSUS</h1>

    <div class="card">
        <div class="icon">
            <svg viewBox="0 0 24 24">
                <path
                    d="M15 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm-9-2V7H4v3H1v2h3v3h2v-3h3v-2H6zm9 4c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
            </svg>
        </div>

        <h2>Criar Conta</h2>
        <p class="subtitle">Junte-se ao universo</p>

        <div class="message" id="msg"></div>

        <form id="registerForm">
            <!-- Nome -->
            <div class="form-group">
                <label>Nome completo</label>
                <div class="input-wrapper">
                    <input type="text" id="name" placeholder="Seu nome" required>
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
                    </svg>
                </div>
            </div>

            <!-- Email -->
            <div class="form-group">
                <label>Email</label>
                <div class="input-wrapper">
                    <input type="email" id="email" placeholder="seu@email.com" required>
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z" />
                    </svg>
                </div>
            </div>

            <!-- Senha -->
            <div class="form-group">
                <label>Senha</label>
                <div class="input-wrapper">
                    <input type="password" id="password" placeholder="Minimo 6 caracteres" required minlength="6">
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1s3.1 1.39 3.1 3.1v2z" />
                    </svg>
                    <button type="button" class="toggle-password" onclick="toggleShow('password', this)">
                        <svg class="eye-icon" viewBox="0 0 24 24">
                            <path
                                d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z" />
                        </svg>
                    </button>
                </div>
                <div class="strength-bar">
                    <div class="bar" id="bar1"></div>
                    <div class="bar" id="bar2"></div>
                    <div class="bar" id="bar3"></div>
                    <div class="bar" id="bar4"></div>
                </div>
                <div class="strength-text" id="strengthText"></div>
            </div>

            <!-- Confirmar Senha -->
            <div class="form-group">
                <label>Confirmar Senha</label>
                <div class="input-wrapper">
                    <input type="password" id="confirm" placeholder="Repita a senha" required minlength="6">
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1s3.1 1.39 3.1 3.1v2z" />
                    </svg>
                    <button type="button" class="toggle-password" onclick="toggleShow('confirm', this)">
                        <svg class="eye-icon" viewBox="0 0 24 24">
                            <path
                                d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z" />
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Tipo de conta -->
            <label style="display:block;color:rgba(255,255,255,0.5);font-size:0.82rem;margin-bottom:8px;">Tipo de
                conta</label>
            <div class="role-selector">
                <div class="role-option active" data-role="aluno" id="roleAluno">
                    <div class="role-icon">🎓</div>
                    <div class="role-label">Aluno</div>
                </div>
                <div class="role-option" data-role="professor" id="roleProfessor">
                    <div class="role-icon">👨‍🏫</div>
                    <div class="role-label">Professor</div>
                </div>
            </div>

            <!-- Terms -->
            <div class="terms">
                <input type="checkbox" id="terms" required>
                <label for="terms">Concordo com os <a href="#">Termos de Uso</a> e a <a href="#">Política de
                        Privacidade</a></label>
            </div>

            <button type="submit" class="btn btn-primary" id="submitBtn">Criar Conta</button>
        </form>

        <div class="modal-backdrop" id="confirmModal">
            <div class="modal-card">
                <h3>Confirmar criação</h3>
                <p>Deseja confirmar a criação da conta? Clique em OK para prosseguir ou Cancelar para revisar os dados.
                </p>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" id="cancelConfirm">Cancelar</button>
                    <button type="button" class="btn btn-primary" id="confirmCreate">Ok</button>
                </div>
            </div>
        </div>

        <div class="divider"><span>ou</span></div>

        <button type="button" class="btn btn-google" id="googleSignupBtn">
            <img src="https://www.svgrepo.com/show/475656/google-color.svg" width="18" alt="Google">
            Continuar com Google
        </button>

        <p class="footer-link" style="margin-top:18px;">Ja tem uma conta? <a href="tela-login.html">Entrar</a></p>
    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="supabase-config.js"></script>

    <script>
        // ===== OAUTH CALLBACK HANDLER =====
        (function () {
            const params = new URLSearchParams(window.location.search);
            const hash = new URLSearchParams(window.location.hash.slice(1));
            const hasCode = params.has('code');
            const hasToken = hash.has('access_token');
            const hasError = params.has('error') || hash.has('error');
            if (!hasCode && !hasToken && !hasError) return;

            document.body.insertAdjacentHTML('afterbegin',
                '<div id="oauthOverlay" style="position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:#090a0f;flex-direction:column;gap:16px;">' +
                '<div style="width:40px;height:40px;border:3px solid rgba(167,139,250,.2);border-top-color:#a78bfa;border-radius:50%;animation:spin .7s linear infinite"></div>' +
                '<p style="color:#e2e8f0;font-family:sans-serif;font-size:.95rem;" id="oauthMsg">Finalizando cadastro com Google...</p>' +
                '<style>@keyframes spin{to{transform:rotate(360deg)}}</style></div>'
            );

            if (hasError) {
                const errDesc = params.get('error_description') || hash.get('error_description') || 'Erro no login com Google';
                document.getElementById('oauthMsg').textContent = decodeURIComponent(errDesc.replace(/\+/g, ' '));
                setTimeout(() => {
                    document.getElementById('oauthOverlay').remove();
                    window.history.replaceState({}, '', window.location.pathname);
                }, 3000);
                return;
            }

            function waitForSession() {
                if (typeof _sb === 'undefined' || !_sb) { setTimeout(waitForSession, 50); return; }
                const { data: { subscription } } = _sb.auth.onAuthStateChange(function (event, session) {
                    if (event !== 'INITIAL_SESSION' && event !== 'SIGNED_IN') return;
                    subscription.unsubscribe();
                    if (session) {
                        window.location.replace('pagina-inicial.html');
                    } else {
                        document.getElementById('oauthMsg').textContent = 'Sessão não encontrada. Tente novamente.';
                        setTimeout(() => {
                            document.getElementById('oauthOverlay').remove();
                            window.history.replaceState({}, '', window.location.pathname);
                        }, 2500);
                    }
                });
            }
            waitForSession();
        })();

        // ===== STARS =====
        function generateStars(canvasId, count, size, speed) {
            const canvas = document.getElementById(canvasId);
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            const stars = [];
            for (let i = 0; i < count; i++) {
                stars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, r: Math.random() * size + 0.5, alpha: Math.random() * 0.8 + 0.2, twinkleSpeed: Math.random() * 0.02 + 0.005 });
            }
            let time = 0;
            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height); time += speed;
                stars.forEach(s => {
                    const alpha = s.alpha * (0.6 + 0.4 * Math.sin(time * s.twinkleSpeed * 10));
                    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255,255,255,${alpha})`; ctx.fill();
                });
                requestAnimationFrame(draw);
            }
            draw();
            window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
        }
        generateStars('stars1', 200, 1.2, 0.3);
        generateStars('stars2', 100, 1.8, 0.2);
        generateStars('stars3', 50, 2.5, 0.1);

        // ===== TOGGLE PASSWORD =====
        function toggleShow(inputId, btn) {
            const input = document.getElementById(inputId);
            const isPassword = input.type === 'password';
            input.type = isPassword ? 'text' : 'password';
        }

        // ===== PASSWORD STRENGTH =====
        const passwordInput = document.getElementById('password');
        const bars = [document.getElementById('bar1'), document.getElementById('bar2'), document.getElementById('bar3'), document.getElementById('bar4')];
        const strengthText = document.getElementById('strengthText');
        const colors = ['#ef4444', '#f59e0b', '#3b82f6', '#22c55e'];
        const labels = ['Fraca', 'Razoavel', 'Boa', 'Forte'];

        passwordInput.addEventListener('input', () => {
            const val = passwordInput.value;
            let score = 0;
            if (val.length >= 6) score++;
            if (val.length >= 10) score++;
            if (/[A-Z]/.test(val) && /[a-z]/.test(val)) score++;
            if (/[0-9]/.test(val) && /[^A-Za-z0-9]/.test(val)) score++;
            bars.forEach((bar, i) => { bar.style.background = i < score ? colors[score - 1] : 'rgba(255,255,255,0.1)'; });
            if (val.length === 0) { strengthText.textContent = ''; }
            else { strengthText.textContent = labels[score - 1] || 'Muito fraca'; strengthText.style.color = score > 0 ? colors[score - 1] : 'rgba(255,255,255,0.2)'; }
        });

        // ===== ROLE SELECTOR =====
        let selectedRole = 'aluno';
        document.querySelectorAll('.role-option').forEach(opt => {
            opt.addEventListener('click', () => {
                document.querySelectorAll('.role-option').forEach(o => o.classList.remove('active'));
                opt.classList.add('active');
                selectedRole = opt.dataset.role;
            });
        });

        // ===== SHOW MESSAGE =====
        function showMessage(text, type) {
            const el = document.getElementById('msg');
            el.textContent = text; el.className = 'message ' + type;
        }

        // ===== CONFIRMATION MODAL =====
        const confirmModal = document.getElementById('confirmModal');
        const confirmCreate = document.getElementById('confirmCreate');
        const cancelConfirm = document.getElementById('cancelConfirm');
        let pendingFormData = null;

        function openConfirmationModal(data) {
            pendingFormData = data;
            confirmModal.classList.add('active');
        }

        function closeConfirmationModal() {
            confirmModal.classList.remove('active');
            pendingFormData = null;
        }

        cancelConfirm.addEventListener('click', closeConfirmationModal);
        confirmCreate.addEventListener('click', () => {
            if (!pendingFormData) return;
            closeConfirmationModal();
            submitRegistration(pendingFormData);
        });

        async function submitRegistration({ name, email, pass, confirm }) {
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Criando conta...';

            const { user, error } = await signUp(email, pass, name, selectedRole);

            btn.disabled = false;
            btn.textContent = 'Criar Conta';

            if (error) {
                let errorMsg = 'Erro ao criar conta.';
                if (error.message.includes('already registered')) {
                    errorMsg = 'Este email ja esta cadastrado.';
                } else if (error.message.includes('valid email')) {
                    errorMsg = 'Email invalido.';
                } else {
                    errorMsg = error.message;
                }
                showMessage(errorMsg, 'error');
                return;
            }

            showMessage('Conta criada com sucesso! Redirecionando...', 'success');
            setTimeout(() => {
                window.location.href = 'tela-login.html';
            }, 2000);
        }

        // ===== GOOGLE SIGNUP =====
        document.getElementById('googleSignupBtn').addEventListener('click', async () => {
            const btn = document.getElementById('googleSignupBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Redirecionando...';
            try {
                const { error } = await _sb.auth.signInWithOAuth({
                    provider: 'google',
                    options: {
                        redirectTo: window.location.href.split('/templates/')[0] + '/'
                    }
                });
                if (error) {
                    showMessage(error.message, 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<img src="https://www.svgrepo.com/show/475656/google-color.svg" width="18" alt="Google"> Continuar com Google';
                }
            } catch (err) {
                showMessage('Erro ao conectar com Google.', 'error');
                btn.disabled = false;
                btn.innerHTML = '<img src="https://www.svgrepo.com/show/475656/google-color.svg" width="18" alt="Google"> Continuar com Google';
            }
        });

        // ===== FORM SUBMIT =====
        document.getElementById('registerForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim().toLowerCase();
            const pass = document.getElementById('password').value;
            const confirm = document.getElementById('confirm').value;

            if (pass !== confirm) { showMessage('As senhas nao coincidem.', 'error'); return; }
            if (pass.length < 6) { showMessage('A senha deve ter pelo menos 6 caracteres.', 'error'); return; }

            showMessage('Confirme a criação da conta para continuar.', 'success');
            openConfirmationModal({ name, email, pass, confirm });
        });
    </script>
</body>
