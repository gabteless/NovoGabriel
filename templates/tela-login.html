<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIVERSUS — Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
            overflow: hidden;
        }

        .stars-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }

        .nebula {
            position: fixed; width: 600px; height: 600px; border-radius: 50%;
            filter: blur(120px); opacity: 0.15; pointer-events: none;
        }
        .nebula-1 { top: -200px; left: -100px; background: #6a0dad; }
        .nebula-2 { bottom: -200px; right: -100px; background: #1e90ff; }

        .title {
            position: fixed; top: 40px; left: 50%; transform: translateX(-50%);
            font-size: 3.5rem; font-weight: 900; letter-spacing: 1.2rem;
            background: linear-gradient(135deg, #a78bfa, #60a5fa, #f472b6, #a78bfa);
            background-size: 300% 300%;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 6s ease infinite;
            user-select: none;
        }

        @keyframes gradientShift {
            0%,100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .card {
            position: relative; z-index: 2;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; padding: 40px 35px;
            width: 420px; max-width: 90vw;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        .card h2 {
            color: #e2e8f0; text-align: center; margin-bottom: 8px;
            font-size: 1.5rem; letter-spacing: 0.1em;
        }

        .card .subtitle {
            color: rgba(255,255,255,0.4); text-align: center;
            font-size: 0.85rem; margin-bottom: 30px;
        }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; color: rgba(255,255,255,0.6); font-size: 0.85rem; margin-bottom: 6px; }
        .form-group input, .form-group select {
            width: 100%; padding: 12px 16px; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; background: rgba(255,255,255,0.05);
            color: #e2e8f0; font-size: 0.95rem; outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
            font-family: inherit;
        }
        .form-group input::placeholder { color: rgba(255,255,255,0.2); }
        .form-group input:focus, .form-group select:focus { border-color: #a78bfa; box-shadow: 0 0 15px rgba(167,139,250,0.2); }

        .btn {
            width: 100%; padding: 13px; border: none; border-radius: 10px;
            font-size: 1rem; font-weight: 600; cursor: pointer;
            letter-spacing: 0.05em; transition: transform 0.2s, box-shadow 0.3s, opacity 0.3s;
        }
        .btn:active { transform: scale(0.97); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-primary {
            background: linear-gradient(135deg, #7c3aed, #3b82f6); color: white;
            box-shadow: 0 4px 20px rgba(124,58,237,0.4);
        }
        .btn-primary:hover:not(:disabled) { box-shadow: 0 4px 30px rgba(124,58,237,0.6); }

        .btn-google {
            background: rgba(255,255,255,0.07);
            color: #e2e8f0;
            border: 1px solid rgba(255,255,255,0.15);
            transition: background 0.3s, border-color 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-google:hover {
            background: rgba(255,255,255,0.12);
            border-color: rgba(167,139,250,0.4);
        }

        .btn-student {
            background: rgba(255,255,255,0.06); color: #e2e8f0;
            border: 1px solid rgba(255,255,255,0.12);
            margin-top: 12px;
            transition: background 0.3s, border-color 0.3s;
        }
        .btn-student:hover { background: rgba(255,255,255,0.1); border-color: rgba(167,139,250,0.4); }

        .toggle-text {
            text-align: center; margin-top: 20px;
            color: rgba(255,255,255,0.4); font-size: 0.85rem;
        }
        .toggle-text a { color: #a78bfa; cursor: pointer; text-decoration: none; font-weight: 600; }
        .toggle-text a:hover { text-decoration: underline; }

        .message {
            text-align: center; padding: 10px; border-radius: 8px;
            margin-bottom: 15px; font-size: 0.85rem; display: none;
        }
        .message.success { display: block; background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); color: #86efac; }
        .message.error { display: block; background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }

        .hidden { display: none; }

        .btn .spinner {
            display: inline-block; width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.3); border-top-color: white;
            border-radius: 50%; animation: spin 0.6s linear infinite;
            vertical-align: middle; margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .separator {
            display: flex; align-items: center; gap: 14px; margin: 24px 0;
            color: rgba(255,255,255,0.2); font-size: 0.8rem;
        }
        .separator::before, .separator::after {
            content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.08);
        }

        .nickname-input {
            width: 100%; padding: 14px 18px; border-radius: 12px;
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
            color: #e2e8f0; font-size: 1.1rem; text-align: center; outline: none;
            transition: border-color 0.3s; font-family: inherit;
        }
        .nickname-input:focus { border-color: #a78bfa; box-shadow: 0 0 15px rgba(167,139,250,0.2); }
        .nickname-input::placeholder { color: rgba(255,255,255,0.2); }

        .back-link {
            text-align: center; margin-top: 16px;
        }
        .back-link a {
            color: rgba(255,255,255,0.35); cursor: pointer; text-decoration: none; font-size: 0.82rem;
        }
        .back-link a:hover { color: rgba(255,255,255,0.6); }

        .role-choice {
            display: flex; gap: 14px; margin-bottom: 12px;
        }
        .role-btn {
            flex: 1; padding: 20px 12px; border-radius: 14px;
            background: rgba(255,255,255,0.04); border: 2px solid rgba(255,255,255,0.08);
            text-align: center; cursor: pointer;
            transition: all 0.3s; user-select: none;
        }
        .role-btn:hover { background: rgba(255,255,255,0.08); }
        .role-btn .role-icon { font-size: 2rem; margin-bottom: 8px; }
        .role-btn .role-label { font-size: 0.85rem; color: rgba(255,255,255,0.6); font-weight: 600; }
        .role-btn .role-desc { font-size: 0.7rem; color: rgba(255,255,255,0.25); margin-top: 4px; }
    </style>
</head>
<body>

    <canvas class="stars-layer" id="stars1"></canvas>
    <canvas class="stars-layer" id="stars2"></canvas>

    <div class="nebula nebula-1"></div>
    <div class="nebula nebula-2"></div>

    <h1 class="title">UNIVERSUS</h1>

    <!-- TELA 1: Escolha Professor ou Aluno -->
    <div class="card" id="choiceCard">
        <h2>Bem-vindo</h2>
        <p class="subtitle">Escolha como deseja entrar</p>
        <div class="role-choice">
            <div class="role-btn" id="choiceTeacher">
                <div class="role-icon">👨‍🏫</div>
                <div class="role-label">Professor</div>
                <div class="role-desc">Conta Google</div>
            </div>
            <div class="role-btn" id="choiceStudent">
                <div class="role-icon">🎓</div>
                <div class="role-label">Aluno</div>
                <div class="role-desc">Apenas apelido</div>
            </div>
        </div>
    </div>

    <!-- TELA 2: Login Professor (apenas Google) -->
    <div class="card hidden" id="loginCard">
        <h2>Entrar como Professor</h2>
        <p class="subtitle">Use sua conta Google</p>
        <div class="message" id="loginMsg"></div>
        <button type="button" class="btn btn-google" id="googleLoginBtn">
            <img src="https://www.svgrepo.com/show/475656/google-color.svg" width="18" alt="Google">
            Entrar com Google
        </button>
        <div class="back-link" style="margin-top:20px"><a id="backFromLogin">← Voltar</a></div>
    </div>

    <!-- TELA 3: Entrada Aluno (apelido) -->
    <div class="card hidden" id="studentCard">
        <h2>Entrar como Aluno</h2>
        <p class="subtitle">Escolha um apelido para jogar</p>
        <div class="message" id="studentMsg"></div>
        <div class="form-group">
            <input type="text" class="nickname-input" id="nicknameInput" placeholder="Seu apelido..." maxlength="25" autofocus>
        </div>
        <button class="btn btn-primary" id="studentEnterBtn">Entrar</button>
        <div class="back-link"><a id="backFromStudent">← Voltar</a></div>
    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="supabase-config.js"></script>

    <script>
        // ===== OAUTH CALLBACK HANDLER =====
        // Supabase pode redirecionar o callback OAuth para esta página (Site URL)
        (function () {
            const params = new URLSearchParams(window.location.search);
            const hash = new URLSearchParams(window.location.hash.slice(1));

            const hasCode = params.has('code');
            const hasToken = hash.has('access_token');
            const hasError = params.has('error') || hash.has('error');

            if (!hasCode && !hasToken && !hasError) return;

            // Mostrar overlay de carregamento enquanto processa
            document.body.insertAdjacentHTML('afterbegin',
                '<div id="oauthOverlay" style="position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:#090a0f;flex-direction:column;gap:16px;">' +
                '<div style="width:40px;height:40px;border:3px solid rgba(167,139,250,.2);border-top-color:#a78bfa;border-radius:50%;animation:spin .7s linear infinite"></div>' +
                '<p style="color:#e2e8f0;font-family:sans-serif;font-size:.95rem;" id="oauthMsg">Finalizando login com Google...</p>' +
                '<style>@keyframes spin{to{transform:rotate(360deg)}}</style></div>'
            );

            if (hasError) {
                const errDesc = params.get('error_description') || hash.get('error_description') || 'Erro no login com Google';
                document.getElementById('oauthMsg').textContent = decodeURIComponent(errDesc.replace(/\+/g, ' '));
                setTimeout(() => {
                    document.getElementById('oauthOverlay').remove();
                    window.history.replaceState({}, '', window.location.pathname);
                }, 3000);
                return;
            }

            // Aguarda o Supabase trocar o código por sessão
            function waitForSession() {
                if (typeof _sb === 'undefined' || !_sb) {
                    setTimeout(waitForSession, 50);
                    return;
                }
                const { data: { subscription } } = _sb.auth.onAuthStateChange(function (event, session) {
                    if (event !== 'INITIAL_SESSION' && event !== 'SIGNED_IN') return;
                    subscription.unsubscribe();
                    if (session) {
                        try {
                            sessionStorage.setItem('uv_auth_handoff', JSON.stringify({
                                access_token: session.access_token,
                                refresh_token: session.refresh_token
                            }));
                        } catch (e) {}
                        window.location.replace('pagina-inicial.html');
                    } else {
                        document.getElementById('oauthMsg').textContent = 'Sessão não encontrada. Tente novamente.';
                        setTimeout(() => {
                            document.getElementById('oauthOverlay').remove();
                            window.history.replaceState({}, '', window.location.pathname);
                        }, 2500);
                    }
                });
            }
            waitForSession();
        })();

        // ===== STARS =====
        function generateStars(canvasId, count, size, speed) {
            const canvas = document.getElementById(canvasId);
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const stars = [];
            for (let i = 0; i < count; i++) {
                stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*size+0.5, alpha: Math.random()*0.8+0.2, twinkle: Math.random()*0.02+0.005 });
            }
            let time = 0;
            function draw() {
                ctx.clearRect(0,0,canvas.width,canvas.height);
                time += speed;
                stars.forEach(s => {
                    const a = s.alpha*(0.6+0.4*Math.sin(time*s.twinkle*10));
                    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
                    ctx.fillStyle = `rgba(255,255,255,${a})`; ctx.fill();
                });
                requestAnimationFrame(draw);
            }
            draw();
            window.addEventListener('resize',()=>{ canvas.width=window.innerWidth; canvas.height=window.innerHeight; });
        }
        generateStars('stars1',200,1.2,0.3);
        generateStars('stars2',100,1.8,0.2);

        // ===== CARD NAVIGATION =====
        const choiceCard = document.getElementById('choiceCard');
        const loginCard = document.getElementById('loginCard');
        const studentCard = document.getElementById('studentCard');

        function showCard(card) {
            [choiceCard, loginCard, studentCard].forEach(c => c.classList.add('hidden'));
            card.classList.remove('hidden');
            document.querySelectorAll('.message').forEach(m => { m.className='message'; m.textContent=''; });
        }

        function showMessage(el, text, type) {
            el.textContent = text; el.className = 'message ' + type;
        }

        document.getElementById('choiceTeacher').addEventListener('click', () => showCard(loginCard));
        document.getElementById('choiceStudent').addEventListener('click', () => {
            showCard(studentCard);
            const saved = localStorage.getItem('uv_student_nickname');
            if (saved) document.getElementById('nicknameInput').value = saved;
            setTimeout(() => document.getElementById('nicknameInput').focus(), 100);
        });

        document.getElementById('backFromLogin').addEventListener('click', () => showCard(choiceCard));
        document.getElementById('backFromStudent').addEventListener('click', () => showCard(choiceCard));

        // ===== GOOGLE LOGIN =====
        document.getElementById('googleLoginBtn').addEventListener('click', async () => {
            const btn = document.getElementById('googleLoginBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Redirecionando...';

            try {
                const { error } = await _sb.auth.signInWithOAuth({
                    provider: 'google',
                    options: {
                        redirectTo: window.location.href.split('/templates/')[0] + '/'
                    }
                });
                if (error) {
                    showMessage(document.getElementById('loginMsg'), error.message, 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<img src="https://www.svgrepo.com/show/475656/google-color.svg" width="18" alt="Google"> Entrar com Google';
                }
            } catch (err) {
                showMessage(document.getElementById('loginMsg'), 'Erro ao conectar com Google.', 'error');
                btn.disabled = false;
                btn.innerHTML = '<img src="https://www.svgrepo.com/show/475656/google-color.svg" width="18" alt="Google"> Entrar com Google';
            }
        });

        // ===== STUDENT NICKNAME ENTRY =====
        const nicknameInput = document.getElementById('nicknameInput');
        const studentMsg = document.getElementById('studentMsg');

        nicknameInput.addEventListener('keydown', e => {
            if (e.key === 'Enter') document.getElementById('studentEnterBtn').click();
        });

        document.getElementById('studentEnterBtn').addEventListener('click', () => {
            const nickname = nicknameInput.value.trim();
            if (nickname.length < 2) {
                showMessage(studentMsg, 'O apelido deve ter pelo menos 2 caracteres.', 'error');
                return;
            }
            localStorage.setItem('uv_student_nickname', nickname);
            showMessage(studentMsg, `Bem-vindo, ${nickname}!`, 'success');
            setTimeout(() => {
                window.location.href = 'pagina-inicial-aluno.html';
            }, 800);
        });
    </script>
</body>
</html>
