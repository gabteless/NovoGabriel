<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIVERSUS — Carregando...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
        }
        .loader {
            text-align: center;
            color: rgba(255,255,255,0.5);
        }
        .loader .spinner {
            width: 40px; height: 40px; margin: 0 auto 16px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #a78bfa;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader p { font-size: 0.9rem; letter-spacing: 0.05em; }
    </style>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <p>Carregando UNIVERSUS...</p>
    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

    <script>
        const BASE = 'NovoGabriel/templates/';

        function goTo(page) {
            window.location.href = BASE + page;
        }

        (async () => {
            // 1. Verificar se é aluno (localStorage, sem dependência do Supabase)
            const nickname = localStorage.getItem('uv_student_nickname');
            if (nickname) {
                goTo('pagina-inicial-aluno.html');
                return;
            }

            // 2. Verificar se é professor (sessão Supabase)
            try {
                const SUPABASE_URL = 'https://otxvqphwtuldkrglfwxh.supabase.co';
                const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im90eHZxcGh3dHVsZGtyZ2xmd3hoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwOTk4OTgsImV4cCI6MjA4ODY3NTg5OH0.jRyaHr3k96dm5-486S-EXvNespBl9Iwh2bIupM1YnVU';
                const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

                const { data: { session } } = await sb.auth.getSession();
                if (session) {
                    const { data: { user } } = await sb.auth.getUser();
                    if (user) {
                        // Sessão válida de professor — ir para dashboard
                        goTo('pagina-inicial.html');
                        return;
                    }
                }
            } catch (err) {
                console.log('Erro ao verificar sessão:', err);
            }

            // 3. Nenhuma sessão ativa — ir para login
            goTo('tela-login.html');
        })();
    </script>
</body>
</html>
